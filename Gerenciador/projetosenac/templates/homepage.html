<!doctype html>
<html lang="pt-br"">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
        {% block titulo %}
        Homepage
        {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

<body>

{% block body %}

<h1>Gerenciador de Fotos</h1>

<h2>Fazer Login</h2>

<form method="POST">
    {{ form.csrf_token }}

    <p>
        {{ form.email.label }}<br>
        {{ form.email() }}
    </p>

    <p>
        {{ form.senha.label }}<br>
        {{ form.senha() }}
    </p>

    <p>{{ form.botao_confirmacao() }}</p>
</form>

<p>Ainda não tem conta? <a href="{{ url_for('criarconta') }}">Crie uma aqui</a></p>

{% endblock %}

</body>
</html>
